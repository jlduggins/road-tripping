<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Road Tripping"/>
<meta name="theme-color" content="#0f172a"/>
<title>Road Tripping</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0f172a}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;box-sizing:border-box}
.app{display:flex;height:100vh;height:100dvh}
/* Sidebar */
.sidebar{width:230px;background:#0f172a;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06)}
.sidebar-header{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo{width:40px;height:40px;background:linear-gradient(135deg,#10b981,#059669);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(16,185,129,.3)}
.sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:4px}
.tab-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:#64748b;font-size:14px;text-align:left;width:100%;transition:all .15s}
.tab-btn.active{background:rgba(16,185,129,.12);color:#10b981;font-weight:600}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.05);color:#94a3b8}
.tab-icon{font-size:17px;width:22px;text-align:center}
.sidebar-footer{padding:12px 10px 24px;border-top:1px solid rgba(255,255,255,.08)}
.log-btn{width:100%;padding:13px;border-radius:12px;border:none;background:#10b981;color:white;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(16,185,129,.35);transition:all .15s}
.log-btn:hover{background:#059669;transform:translateY(-1px)}
.log-btn:active{transform:translateY(0)}
/* Main */
.main{flex:1;overflow:hidden;position:relative;background:#f8fafc}
.tab-panel{position:absolute;inset:0;display:none;flex-direction:column}
.tab-panel.active{display:flex}
/* Map */
#map{width:100%;height:100%;border-radius:0}
.map-hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;background:white;padding:8px 20px;border-radius:999px;box-shadow:0 2px 16px rgba(0,0,0,.14);font-size:13px;color:#475569;pointer-events:none;white-space:nowrap;font-weight:500}
.locate-btn{position:absolute;bottom:24px;right:16px;z-index:1000;width:44px;height:44px;border-radius:50%;background:white;border:none;box-shadow:0 2px 12px rgba(0,0,0,.18);font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.locate-btn:hover{transform:scale(1.05)}
/* Panel header */
.panel-header{background:white;border-bottom:1px solid #e2e8f0;padding:18px 18px 14px;flex-shrink:0}
/* Entries */
.entries-list{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.entry-card{background:white;border-radius:14px;border:1px solid #e2e8f0;padding:18px;cursor:pointer;margin-bottom:10px;transition:all .15s;animation:fadeIn .2s ease}
.entry-card:hover{border-color:#10b981;box-shadow:0 4px 16px rgba(16,185,129,.1)}
.entry-card:active{transform:scale(.99)}
/* Inputs */
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;background:white;font-size:14px;color:#1e293b;transition:border-color .15s}
.inp:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.08)}
.inp-sm{padding:6px 10px;font-size:12px;width:auto}
select.inp{background:white}
textarea.inp{resize:none}
.lbl{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;letter-spacing:.2px}
.lbl-hint{font-weight:400;color:#94a3b8;font-size:11px}
.badge{background:#ecfdf5;color:#065f46;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block;margin:2px}
/* Modal */
.overlay{position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.7);display:none;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:white;border-radius:20px;width:100%;max-width:640px;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.3);margin:auto;max-height:94vh;animation:fadeIn .2s ease}
.modal-header{padding:18px 22px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-body{overflow-y:auto;padding:20px 22px;flex:1;-webkit-overflow-scrolling:touch}
.modal-footer{padding:14px 22px;border-top:1px solid #f1f5f9;background:#f8fafc;border-radius:0 0 20px 20px;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
/* Stars */
.star{font-size:28px;cursor:pointer;user-select:none;color:#d1d5db;transition:color .1s;padding:2px}
.star.on{color:#f59e0b}
/* Amenities */
.amenity-box{background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;padding:16px}
.amenity-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#475569;padding:3px 0}
.amenity-check input{width:16px;height:16px;accent-color:#10b981;flex-shrink:0}
/* AI */
.ai-messages{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.msg-row{display:flex;gap:10px;align-items:flex-start;animation:fadeIn .2s ease}
.msg-row.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-bubble{max-width:80%;padding:12px 16px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg-bubble.ai{background:white;border:1px solid #e2e8f0;color:#1e293b;border-radius:4px 16px 16px 16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.msg-bubble.user{background:#10b981;color:white;border-radius:16px 4px 16px 16px}
.quick-wrap{padding:0 18px 12px;display:flex;flex-wrap:wrap;gap:8px}
.quick-btn{background:white;border:1.5px solid #e2e8f0;border-radius:20px;padding:7px 14px;font-size:12px;color:#475569;font-weight:500;transition:all .15s}
.quick-btn:hover{border-color:#10b981;color:#10b981}
.ai-input-row{padding:12px 14px;background:white;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-shrink:0}
/* Error / info */
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 14px;font-size:13px;color:#dc2626;width:100%;margin-bottom:10px}
.info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#166534;width:100%;margin-bottom:10px}
/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;gap:12px;padding:40px;text-align:center}
/* Offline banner */
#offline-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#f59e0b;color:white;text-align:center;padding:8px;font-size:13px;font-weight:600}
/* Photo grid */
.photo-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.photo-wrap img{width:80px;height:80px;object-fit:cover;border-radius:10px;border:2px solid #e2e8f0;display:block}
.photo-remove{position:absolute;top:-6px;right:-6px;background:#ef4444;color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;padding:0;line-height:20px;text-align:center}
/* Responsive — mobile sidebar becomes bottom nav */
@media(max-width:640px){
  .sidebar{width:100%;height:60px;flex-direction:row;position:fixed;bottom:0;left:0;right:0;z-index:100;border-right:none;border-top:1px solid rgba(255,255,255,.08)}
  .sidebar-header,.sidebar-footer{display:none}
  .sidebar-nav{flex-direction:row;padding:6px 8px;align-items:center;justify-content:space-around;gap:0}
  .tab-btn{flex-direction:column;gap:3px;padding:6px 10px;font-size:10px;align-items:center;width:auto;flex:1}
  .tab-icon{font-size:20px;width:auto}
  .app{flex-direction:column}
  .main{padding-bottom:60px}
  .modal{max-height:85vh}
  .form-grid{grid-template-columns:1fr}
  .full{grid-column:1}
}
@media(min-width:641px){
  .mobile-log-btn{display:none}
}
</style>
</head>
<body>

<div id="offline-banner">⚠ You're offline — map tiles may not load, but your data is safe</div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">🏕</div>
      <div>
        <div style="color:white;font-weight:700;font-size:15px">Road Tripping</div>
        <div id="loc-count" style="font-size:11px;color:#64748b;margin-top:2px">0 locations logged</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="tab-btn active" onclick="showTab('map',this)">
        <span class="tab-icon">🗺</span><span>Map View</span>
      </button>
      <button class="tab-btn" onclick="showTab('entries',this)">
        <span class="tab-icon">☰</span><span>Logged Entries</span>
      </button>
      <button class="tab-btn" onclick="showTab('ai',this)">
        <span class="tab-icon">✨</span><span>AI Assistant</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <button class="log-btn" onclick="openForm(null)">+ Log Location</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- MAP TAB -->
    <div id="tab-map" class="tab-panel active" style="position:absolute;inset:0">
      <div id="map"></div>
      <div class="map-hint">Tap anywhere on the map to log a location</div>
      <button class="locate-btn" onclick="locateMe()" title="Find my location">📍</button>
    </div>

    <!-- ENTRIES TAB -->
    <div id="tab-entries" class="tab-panel" style="background:#f8fafc">
      <div class="panel-header">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h2 style="font-size:18px;font-weight:700;color:#0f172a">Logged Entries</h2>
          <span id="entries-badge" style="background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:999px;font-size:13px;font-weight:600">0</span>
        </div>
        <input class="inp" id="search-inp" placeholder="🔍  Search locations, notes…" oninput="renderEntries()" style="margin-bottom:8px"/>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select class="inp inp-sm" id="f-type" onchange="renderEntries()">
            <option value="">All Types</option>
            <option>National Park</option><option>National Forest</option><option>BLM</option>
            <option>Dispersed</option><option>Private</option><option>Other</option>
          </select>
          <select class="inp inp-sm" id="f-status" onchange="renderEntries()">
            <option value="">All Statuses</option>
            <option value="visited">Visited</option><option value="current">Currently Here</option><option value="planned">Planned</option>
          </select>
          <select class="inp inp-sm" id="f-rating" onchange="renderEntries()">
            <option value="0">Any Rating</option><option value="1">1+ ★</option><option value="2">2+ ★</option>
            <option value="3">3+ ★</option><option value="4">4+ ★</option><option value="5">5 ★</option>
          </select>
        </div>
      </div>
      <div id="entries-list" class="entries-list"></div>
    </div>

    <!-- AI TAB -->
    <div id="tab-ai" class="tab-panel" style="background:#f8fafc">
      <div class="panel-header" style="flex-shrink:0">
        <h2 style="font-size:18px;font-weight:700;color:#0f172a;margin-bottom:4px">✨ AI Assistant</h2>
        <p style="font-size:13px;color:#64748b">Ask for nearby camping suggestions or route stops.</p>
      </div>
      <div id="ai-messages" class="ai-messages"></div>
      <div id="quick-prompts" class="quick-wrap"></div>
      <div class="ai-input-row">
        <input class="inp" id="ai-inp" placeholder="e.g. Free BLM camping near Chico, CA?" style="flex:1" onkeydown="if(event.key==='Enter')sendAI()"/>
        <button onclick="sendAI()" style="background:#10b981;color:white;border:none;border-radius:10px;padding:0 18px;font-weight:700;font-size:20px;flex-shrink:0">→</button>
      </div>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="overlay" id="form-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 style="font-size:17px;font-weight:700" id="form-title">⛺ Log New Location</h2>
      <button onclick="closeForm()" style="background:none;border:none;font-size:22px;color:#94a3b8;line-height:1;padding:4px">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">

        <div class="full">
          <label class="lbl">Location Name *</label>
          <input class="inp" id="f-name" placeholder="e.g. Yellow Post Sites, Keller Peak"/>
        </div>

        <div class="full">
          <label class="lbl">Address <span class="lbl-hint">(used to find map pin if no coords entered)</span></label>
          <input class="inp" id="f-address" placeholder="e.g. Forest Rd 2N10, Big Bear, CA"/>
        </div>

        <div class="full">
          <label class="lbl">📍 Coordinates <span class="lbl-hint">— auto-filled when you tap the map</span></label>
          <input class="inp" id="f-coords" placeholder="e.g. 37.6137, -113.0998"/>
          <div id="coords-hint" style="font-size:11px;color:#10b981;margin-top:4px;display:none"></div>
        </div>

        <div>
          <label class="lbl">📅 Arrival Date</label>
          <input class="inp" type="date" id="f-arrival"/>
        </div>
        <div>
          <label class="lbl">📅 Departure Date</label>
          <input class="inp" type="date" id="f-departure"/>
        </div>

        <div>
          <label class="lbl">Type</label>
          <select class="inp" id="f-type-sel">
            <option>National Park</option><option>National Forest</option><option>BLM</option>
            <option selected>Dispersed</option><option>Private</option><option>Other</option>
          </select>
        </div>
        <div>
          <label class="lbl">Visit Status</label>
          <select class="inp" id="f-status-sel">
            <option value="visited">Visited</option>
            <option value="current">Currently Here</option>
            <option value="planned">Planned</option>
          </select>
        </div>

        <div>
          <label class="lbl">💵 Cost per night ($)</label>
          <input class="inp" type="number" min="0" step="0.01" id="f-cost" placeholder="0 = free"/>
        </div>
        <div>
          <label class="lbl">Rating</label>
          <div id="stars" style="display:flex;gap:2px;padding-top:6px">
            <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span>
          </div>
        </div>

        <div class="full amenity-box">
          <div style="font-weight:700;font-size:13px;margin-bottom:12px;color:#374151">Amenities & Tags</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <label class="amenity-check"><input type="checkbox" id="a-water"/> 💧 Potable Water</label>
            <label class="amenity-check"><input type="checkbox" id="a-dump"/> 🗑 Dump Station</label>
            <label class="amenity-check"><input type="checkbox" id="a-seasonal"/> ⚠ Seasonal Closure</label>
            <label class="amenity-check"><input type="checkbox" id="a-fire"/> 🔥 Fire Allowed</label>
            <label class="amenity-check"><input type="checkbox" id="a-pets"/> 🐾 Pet Friendly</label>
            <label class="amenity-check"><input type="checkbox" id="a-hookups"/> ⚡ Electric Hookups</label>
          </div>
        </div>

        <div class="full">
          <label class="lbl">Notes</label>
          <textarea class="inp" id="f-notes" rows="3" placeholder="Cell service? Road conditions? Best spots? Grey water disposal?"></textarea>
        </div>

        <div class="full">
          <label class="lbl">Photos</label>
          <div id="photo-row" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px"></div>
          <input type="file" id="photo-inp" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)"/>
          <button type="button" onclick="document.getElementById('photo-inp').click()"
            style="width:80px;height:80px;border:2px dashed #cbd5e1;border-radius:10px;background:white;font-size:28px;color:#94a3b8;display:flex;align-items:center;justify-content:center">+</button>
        </div>

      </div>
    </div>
    <div class="modal-footer">
      <div id="geo-error" class="err" style="display:none"></div>
      <div id="geo-info" class="info" style="display:none"></div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <button id="delete-btn" onclick="deleteEntry()" style="background:none;border:none;color:#ef4444;font-weight:600;font-size:14px;display:none">🗑 Delete</button>
        <div style="display:flex;gap:10px;margin-left:auto">
          <button onclick="closeForm()" style="padding:10px 20px;border-radius:10px;border:1.5px solid #e2e8f0;background:white;font-weight:600;font-size:14px">Cancel</button>
          <button id="save-btn" onclick="saveEntry()" style="padding:10px 24px;border-radius:10px;border:none;background:#10b981;color:white;font-weight:600;font-size:14px;transition:opacity .15s">Save Location</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'road-tripping-v1';
const TYPE_ICONS  = {"National Park":"🏔","National Forest":"🌲","BLM":"🏜","Dispersed":"⛺","Private":"🏠","Other":"📍"};
const STATUS_LABEL= {visited:"Visited",current:"Currently Here",planned:"Planned"};
const AMENITY_MAP = {
  'a-water':'hasPotableWater','a-dump':'hasDumpStation','a-seasonal':'isSeasonal',
  'a-fire':'hasFireAllowed','a-pets':'hasPets','a-hookups':'hasHookups'
};
const AMENITY_META = [
  {id:'hasPotableWater',label:'Potable Water',icon:'💧'},
  {id:'hasDumpStation', label:'Dump Station', icon:'🗑'},
  {id:'isSeasonal',     label:'Seasonal Closure',icon:'⚠'},
  {id:'hasFireAllowed', label:'Fire Allowed', icon:'🔥'},
  {id:'hasPets',        label:'Pet Friendly', icon:'🐾'},
  {id:'hasHookups',     label:'Electric Hookups',icon:'⚡'},
];

// ── State ─────────────────────────────────────────────────────────────────────
let entries = [];
let editId  = null;
let pendingLat = null, pendingLng = null;
let currentRating = 0;
let pendingPhotos = [];
let map, markers = [];
let aiMessages = [];

function genId(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function today(){ return new Date().toISOString().split('T')[0]; }
function tomorrow(){ return new Date(Date.now()+86400000).toISOString().split('T')[0]; }

// ── Storage ───────────────────────────────────────────────────────────────────
function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }catch(e){}
}
function loadData(){
  try{
    const d = localStorage.getItem(STORAGE_KEY);
    if(d) entries = JSON.parse(d);
  }catch(e){}
}

// ── Offline banner ────────────────────────────────────────────────────────────
window.addEventListener('online',  ()=>{ document.getElementById('offline-banner').style.display='none'; });
window.addEventListener('offline', ()=>{ document.getElementById('offline-banner').style.display='block'; });
if(!navigator.onLine) document.getElementById('offline-banner').style.display='block';

// ── Tab switching ─────────────────────────────────────────────────────────────
function showTab(name, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='entries') renderEntries();
  if(name==='ai') renderAI();
  if(name==='map'){ setTimeout(()=>map&&map.invalidateSize(),150); }
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap(){
  map = L.map('map',{zoomControl:true}).setView([39.8283,-98.5795],4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19
  }).addTo(map);
  map.on('click', e=>openForm(null, e.latlng.lat, e.latlng.lng));
  locateMe();
  renderMarkers();
}

function locateMe(){
  if(!navigator.geolocation){ alert('Geolocation not supported on this device.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos=>map.setView([pos.coords.latitude, pos.coords.longitude], 10),
    ()=>{}
  );
}

function renderMarkers(){
  markers.forEach(m=>m.remove());
  markers=[];
  entries.filter(e=>e.lat!=null&&e.lng!=null).forEach(entry=>{
    const icon=L.divIcon({
      html:`<div style="background:#10b981;width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px;display:block;text-align:center;line-height:26px">${TYPE_ICONS[entry.type]||'📍'}</span></div>`,
      className:'',iconSize:[32,32],iconAnchor:[16,32],popupAnchor:[0,-36]
    });
    const m=L.marker([entry.lat,entry.lng],{icon}).addTo(map);
    const cost=entry.cost==null?'Cost unknown':entry.cost===0?'Free':'$'+entry.cost+'/night';
    m.bindPopup(`<div style="font-family:system-ui;min-width:190px;padding:4px">
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${entry.name}</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">${entry.type} · ${STATUS_LABEL[entry.status]||entry.status}</div>
      <div style="font-size:12px;color:#475569;margin-bottom:8px">${entry.arrivalDate} → ${entry.departureDate}<br/>${cost}</div>
      <button onclick="window._editEntry('${entry.id}')" style="background:#10b981;color:white;border:none;padding:8px 0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;width:100%">Edit / View Details</button>
    </div>`);
    markers.push(m);
  });
}
window._editEntry = id=>{ map.closePopup(); openForm(entries.find(e=>e.id===id)); };

// ── Form ──────────────────────────────────────────────────────────────────────
function openForm(entry, lat, lng){
  editId      = entry ? entry.id : null;
  pendingLat  = entry ? entry.lat : (lat!=null ? lat : null);
  pendingLng  = entry ? entry.lng : (lng!=null ? lng : null);
  pendingPhotos = entry ? (entry.photos||[]).map(p=>({...p})) : [];
  currentRating = entry ? (entry.rating||0) : 0;

  document.getElementById('form-title').textContent = entry ? '⛺ Edit Location' : '⛺ Log New Location';
  document.getElementById('f-name').value      = entry ? entry.name         : '';
  document.getElementById('f-address').value   = entry ? (entry.address||'')  : '';
  document.getElementById('f-coords').value    = (entry&&entry.lat!=null)
    ? entry.lat.toFixed(6)+', '+entry.lng.toFixed(6)
    : (lat!=null ? lat.toFixed(6)+', '+lng.toFixed(6) : '');
  document.getElementById('f-arrival').value   = entry ? entry.arrivalDate   : today();
  document.getElementById('f-departure').value = entry ? entry.departureDate : tomorrow();
  document.getElementById('f-type-sel').value  = entry ? entry.type          : 'Dispersed';
  document.getElementById('f-status-sel').value= entry ? entry.status        : 'visited';
  document.getElementById('f-cost').value      = (entry&&entry.cost!=null)   ? entry.cost : '';
  document.getElementById('f-notes').value     = entry ? (entry.notes||'')   : '';

  Object.entries(AMENITY_MAP).forEach(([el,key])=>{
    document.getElementById(el).checked = entry ? !!entry[key] : false;
  });

  const hint = document.getElementById('coords-hint');
  hint.style.display = (lat!=null&&!entry) ? 'block' : 'none';
  if(lat!=null&&!entry) hint.textContent='✓ Map pin: '+lat.toFixed(5)+', '+lng.toFixed(5);

  document.getElementById('geo-error').style.display='none';
  document.getElementById('geo-info').style.display='none';
  document.getElementById('delete-btn').style.display = entry ? 'inline-block' : 'none';

  updateStars(currentRating);
  renderPhotoRow();
  document.getElementById('form-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),100);
}

function closeForm(){
  document.getElementById('form-overlay').classList.remove('open');
  editId=null; pendingLat=null; pendingLng=null; pendingPhotos=[];
}

// Stars
function updateStars(v){
  currentRating=v;
  document.querySelectorAll('#stars .star').forEach(s=>{
    s.classList.toggle('on', parseInt(s.dataset.v)<=v);
  });
}
document.querySelectorAll('#stars .star').forEach(s=>{
  s.addEventListener('click',()=>updateStars(parseInt(s.dataset.v)===currentRating?0:parseInt(s.dataset.v)));
  s.addEventListener('mouseenter',()=>document.querySelectorAll('#stars .star').forEach(x=>x.classList.toggle('on',parseInt(x.dataset.v)<=parseInt(s.dataset.v))));
  s.addEventListener('mouseleave',()=>updateStars(currentRating));
});

// Photos
function handlePhotos(input){
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{ pendingPhotos.push({id:genId(),data:ev.target.result,name:file.name}); renderPhotoRow(); };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function renderPhotoRow(){
  const row=document.getElementById('photo-row');
  row.innerHTML='';
  pendingPhotos.forEach(p=>{
    const wrap=document.createElement('div');
    wrap.className='photo-wrap';
    wrap.innerHTML=`<img src="${p.data}" alt=""/><button class="photo-remove" onclick="removePhoto('${p.id}')">✕</button>`;
    row.appendChild(wrap);
  });
}
function removePhoto(id){ pendingPhotos=pendingPhotos.filter(p=>p.id!==id); renderPhotoRow(); }

// Save
async function saveEntry(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ showErr('Please enter a location name.'); return; }

  const errEl  = document.getElementById('geo-error');
  const infoEl = document.getElementById('geo-info');
  const btn    = document.getElementById('save-btn');
  errEl.style.display='none';
  infoEl.style.display='none';

  let lat=pendingLat, lng=pendingLng;
  const coordsText = document.getElementById('f-coords').value.trim();
  const address    = document.getElementById('f-address').value.trim();

  // Priority 1: typed coordinates
  if(coordsText){
    const parts=coordsText.split(',').map(p=>parseFloat(p.trim()));
    if(!isNaN(parts[0])&&!isNaN(parts[1])){ lat=parts[0]; lng=parts[1]; }
    else{ showErr('Invalid coordinates — use format: 37.6137, -113.0998'); return; }
  }

  // Priority 2: geocode address (Nominatim — works fine outside sandbox)
  if(lat==null && address){
    btn.textContent='Finding location…'; btn.disabled=true;
    infoEl.textContent='🔍 Looking up address coordinates…'; infoEl.style.display='block';
    try{
      const res  = await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(address)+'&limit=1',{headers:{'Accept-Language':'en','User-Agent':'RoadTripping/1.0'}});
      const data = await res.json();
      if(data&&data.length){
        lat=parseFloat(data[0].lat); lng=parseFloat(data[0].lon);
        infoEl.textContent='✓ Found coordinates for "'+address+'"';
      } else {
        showErr('Could not find coordinates for that address. Try being more specific, or enter lat/lng manually (copy from Google Maps).');
        btn.textContent='Save Location'; btn.disabled=false; return;
      }
    }catch(e){
      showErr('Could not reach geocoding service. Enter lat/lng manually — long-press any spot in Google Maps to copy coordinates.');
      btn.textContent='Save Location'; btn.disabled=false; return;
    }
    btn.textContent='Save Location'; btn.disabled=false;
  }

  const amenities={};
  Object.entries(AMENITY_MAP).forEach(([el,key])=>{ amenities[key]=document.getElementById(el).checked; });
  const costVal=document.getElementById('f-cost').value;

  const entry={
    id:        editId||genId(),
    createdAt: editId?(entries.find(e=>e.id===editId)||{}).createdAt||new Date().toISOString():new Date().toISOString(),
    name,
    address,
    lat, lng,
    arrivalDate:  document.getElementById('f-arrival').value,
    departureDate:document.getElementById('f-departure').value,
    type:   document.getElementById('f-type-sel').value,
    status: document.getElementById('f-status-sel').value,
    cost:   costVal===''?null:parseFloat(costVal),
    rating: currentRating,
    notes:  document.getElementById('f-notes').value.trim(),
    photos: pendingPhotos.slice(),
    ...amenities
  };

  if(editId){ entries=entries.map(e=>e.id===editId?entry:e); }
  else{ entries=[entry,...entries]; }

  saveData(); closeForm(); updateCount(); renderMarkers(); renderEntries();
}

function showErr(msg){
  const el=document.getElementById('geo-error');
  el.textContent=msg; el.style.display='block';
}

function deleteEntry(){
  if(!editId||!confirm('Delete this location? This cannot be undone.')) return;
  entries=entries.filter(e=>e.id!==editId);
  saveData(); closeForm(); updateCount(); renderMarkers(); renderEntries();
}

// ── Entries ───────────────────────────────────────────────────────────────────
function renderEntries(){
  const q   =(document.getElementById('search-inp').value||'').toLowerCase();
  const ft  = document.getElementById('f-type').value;
  const fs  = document.getElementById('f-status').value;
  const fr  = parseInt(document.getElementById('f-rating').value||'0');

  const filtered=entries.filter(e=>{
    const match=!q||[e.name,e.notes||'',e.address||'',e.type].some(s=>s.toLowerCase().includes(q));
    return match&&(!ft||e.type===ft)&&(!fs||e.status===fs)&&(e.rating||0)>=fr;
  }).sort((a,b)=>new Date(b.arrivalDate)-new Date(a.arrivalDate));

  document.getElementById('entries-badge').textContent=filtered.length;
  const list=document.getElementById('entries-list');

  if(!entries.length){
    list.innerHTML='<div class="empty"><div style="font-size:52px">🏕</div><div style="font-size:16px;font-weight:600;color:#475569">No locations yet</div><div style="font-size:14px">Tap the map or "+ Log Location" to start</div></div>';
    return;
  }
  if(!filtered.length){
    list.innerHTML='<div class="empty"><div style="font-size:36px">🔍</div><div style="font-size:15px;font-weight:600;color:#475569">No matches</div><div>Try adjusting your filters</div></div>';
    return;
  }

  list.innerHTML=filtered.map(e=>{
    const nights=Math.max(0,Math.round((new Date(e.departureDate)-new Date(e.arrivalDate))/86400000));
    const active=AMENITY_META.filter(a=>e[a.id]);
    const sc=e.status==='current'?'#3b82f6':e.status==='planned'?'#f59e0b':'#10b981';
    const cost=e.cost===0?'Free':e.cost==null?'Unknown':'$'+e.cost+'/night';
    const photos=(e.photos||[]).slice(0,5).map(p=>`<img src="${p.data}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;flex-shrink:0"/>`).join('')+
      (e.photos&&e.photos.length>5?`<div style="width:52px;height:52px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:12px;color:#64748b;font-weight:600">+${e.photos.length-5}</div>`:'');
    const entryJson=JSON.stringify(e).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return `<div class="entry-card" onclick="openForm(JSON.parse(this.dataset.entry))" data-entry="${entryJson}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:700;color:#0f172a;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.name}</div>
          <div style="font-size:12px;color:#64748b;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span>${TYPE_ICONS[e.type]||'📍'} ${e.type}</span>·<span style="color:${sc};font-weight:600">${STATUS_LABEL[e.status]||e.status}</span>
          </div>
          ${e.address?`<div style="font-size:11px;color:#94a3b8;margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.address}</div>`:''}
        </div>
        ${e.rating>0?`<div style="background:#fffbeb;padding:4px 10px;border-radius:8px;display:flex;gap:4px;align-items:center;flex-shrink:0;margin-left:10px"><span style="color:#f59e0b">★</span><span style="font-weight:700;color:#92400e">${e.rating}</span></div>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:${active.length||e.notes||(e.photos&&e.photos.length)?'10px':'0'}">
        <div style="background:#f8fafc;border-radius:10px;padding:12px">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Dates</div>
          <div style="font-size:12px;font-weight:600;color:#1e293b">${e.arrivalDate} → ${e.departureDate}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px">${nights} night${nights!==1?'s':''}</div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:12px">
          <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Cost</div>
          <div style="font-size:12px;font-weight:600;color:#1e293b">${cost}</div>
          ${e.cost>0?`<div style="font-size:11px;color:#94a3b8;margin-top:2px">Total: $${(e.cost*nights).toFixed(2)}</div>`:''}
        </div>
      </div>
      ${active.length?`<div style="display:flex;flex-wrap:wrap;margin-bottom:8px">${active.map(a=>`<span class="badge">${a.icon} ${a.label}</span>`).join('')}</div>`:''}
      ${e.notes?`<p style="margin:0 0 8px;font-size:12px;color:#64748b;font-style:italic;background:#f8fafc;padding:8px 12px;border-radius:8px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">&ldquo;${e.notes}&rdquo;</p>`:''}
      ${(e.photos&&e.photos.length)?`<div style="display:flex;gap:6px;flex-wrap:wrap">${photos}</div>`:''}
    </div>`;
  }).join('');
}

// ── AI ────────────────────────────────────────────────────────────────────────
const QUICK=['Suggest free BLM camping near me','What are my highest-rated spots?','Dispersed camping in Northern CA','Best stops between Chico and Lake Tahoe'];

function renderAI(){
  if(!aiMessages.length){
    aiMessages=[{role:'assistant',text:'Hi! I can suggest nearby camping spots, BLM land, dispersed sites, or stops along a route — tailored to van life. Where are you headed?'}];
  }
  const wrap=document.getElementById('ai-messages');
  wrap.innerHTML=aiMessages.map(m=>`
    <div class="msg-row ${m.role==='user'?'user':''}">
      <div class="avatar" style="background:${m.role==='user'?'#10b981':'#e2e8f0'}">${m.role==='user'?'👤':'🤖'}</div>
      <div class="msg-bubble ${m.role==='assistant'?'ai':'user'}">${m.text}</div>
    </div>`).join('');
  wrap.scrollTop=wrap.scrollHeight;
  const qp=document.getElementById('quick-prompts');
  qp.innerHTML=aiMessages.length<=1?QUICK.map(p=>`<button class="quick-btn" onclick="document.getElementById('ai-inp').value='${p}'">${p}</button>`).join(''):'';
}

async function sendAI(){
  const inp=document.getElementById('ai-inp');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';
  aiMessages.push({role:'user',text});
  renderAI();

  const wrap=document.getElementById('ai-messages');
  const loader=document.createElement('div');
  loader.className='msg-row';
  loader.innerHTML=`<div class="avatar" style="background:#e2e8f0">🤖</div><div class="msg-bubble ai" style="display:flex;gap:6px;padding:14px 18px">${[0,.2,.4].map(d=>`<span style="width:8px;height:8px;background:#94a3b8;border-radius:50%;display:inline-block;animation:bounce 1s ease ${d}s infinite"></span>`).join('')}</div>`;
  wrap.appendChild(loader);
  wrap.scrollTop=wrap.scrollHeight;

  const system=`You are a travel assistant for a full-time van dweller living in a Sprinter van. Suggest real, specific nearby camping spots, BLM dispersed sites, national forest camps, dump stations, and interesting stops. Always mention: distances, cell service quality, road conditions (2WD vs 4WD), cost, and whether grey water disposal is available nearby. The user is vegetarian and never dumps grey water outside designated stations. Their logged travel history: ${JSON.stringify(entries.map(e=>({name:e.name,type:e.type,lat:e.lat,lng:e.lng,rating:e.rating,notes:e.notes,arrivalDate:e.arrivalDate,cost:e.cost})))}`;
  const history=aiMessages.slice(0,-1).map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.text}));

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system,messages:[...history,{role:'user',content:text}]})
    });
    const data=await res.json();
    const reply=data.content&&data.content.find(c=>c.type==='text');
    aiMessages.push({role:'assistant',text:reply?reply.text:'Sorry, I could not get a response.'});
  }catch(e){
    aiMessages.push({role:'assistant',text:'Something went wrong — check your connection and try again.'});
  }
  loader.remove();
  renderAI();
}

// ── Count ─────────────────────────────────────────────────────────────────────
function updateCount(){
  document.getElementById('loc-count').textContent=entries.length+' location'+(entries.length!==1?'s':'')+' logged';
}

// ── Service Worker registration ───────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
updateCount();
window.addEventListener('load',()=>{
  initMap();
  renderEntries();
  renderAI();
});
</script>
